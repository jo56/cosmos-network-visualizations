<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos.gl Network Visualizations</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #111111;
      border-right: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 1000;
      transition: width 0.2s ease;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 11px;
      color: #666666;
      font-weight: 400;
    }

    .nav-list {
      padding: 8px;
      flex: 1;
    }

    .nav-item {
      margin-bottom: 2px;
    }

    .nav-button {
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #999999;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      text-align: left;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .nav-button:hover {
      background: #1a1a1a;
      color: #e5e5e5;
    }

    .nav-button.active {
      background: #1a1a1a;
      color: #ffffff;
    }

    .nav-button.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 16px;
      background: #ffffff;
      border-radius: 0 2px 2px 0;
    }


    .nav-label {
      flex: 1;
      font-weight: 400;
    }

    .nav-number {
      font-size: 11px;
      color: #666666;
      font-weight: 500;
      opacity: 0.5;
    }

    .nav-button.active .nav-number {
      color: #999999;
      opacity: 1;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    #graph-container {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 13px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Info Panel */
    .info-panel {
      background: rgba(17, 17, 17, 0.6);
      padding: 16px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    .info-panel h3 {
      color: #ffffff;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .info-panel .description {
      color: #999999;
      font-size: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .info-stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #666666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .stat-value {
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
    }

    /* Scrollbar Styling */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 3px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }

      .sidebar-header {
        padding: 20px 16px;
      }

      .nav-button {
        padding: 8px 10px;
        font-size: 12px;
      }

      .info-panel {
        padding: 12px;
        margin: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Cosmos Networks</h1>
        <p>10 Visualizations</p>
      </div>
      <nav class="nav-list" id="nav-container">
        <!-- Navigation items will be generated by JavaScript -->
      </nav>
      <div class="info-panel" id="info-panel" style="display: none;">
        <h3 id="network-name">Network Name</h3>
        <p class="description" id="network-description">Description</p>
        <div class="info-stats">
          <div class="stat-item">
            <span class="stat-label">Nodes</span>
            <span class="stat-value" id="node-count">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Links</span>
            <span class="stat-value" id="link-count">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Density</span>
            <span class="stat-value" id="network-density">0%</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="graph-container">
        <div class="loading" id="loading">
          <div class="loading-spinner"></div>
          <div>Loading visualization...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
