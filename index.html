<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos.gl Network Visualizations</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1a1f3a 0%, #0f1329 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
    }

    .sidebar-header {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .sidebar-header p {
      font-size: 0.85rem;
      color: #8b8fa3;
    }

    .nav-list {
      padding: 1rem 0;
      flex: 1;
    }

    .nav-item {
      margin: 0.5rem 1rem;
      position: relative;
    }

    .nav-button {
      width: 100%;
      padding: 1rem 1.25rem;
      background: transparent;
      border: 2px solid transparent;
      border-radius: 12px;
      color: #b8bcc8;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
    }

    .nav-button::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 4px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      transform: scaleY(0);
      transition: transform 0.3s ease;
    }

    .nav-button:hover {
      background: rgba(102, 126, 234, 0.1);
      color: #ffffff;
      transform: translateX(4px);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .nav-button.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
      border-color: rgba(102, 126, 234, 0.5);
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
    }

    .nav-button.active::before {
      transform: scaleY(1);
    }

    .nav-icon {
      font-size: 1.25rem;
      width: 24px;
      text-align: center;
    }

    .nav-label {
      flex: 1;
    }

    .nav-number {
      font-size: 0.75rem;
      opacity: 0.6;
      font-weight: 600;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #graph-container {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.1rem;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Info Panel */
    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(26, 31, 58, 0.95);
      backdrop-filter: blur(20px);
      padding: 1.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      min-width: 240px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .info-panel h3 {
      color: #ffffff;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .info-panel .description {
      color: #8b8fa3;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .info-stats {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #8b8fa3;
      font-size: 0.85rem;
    }

    .stat-value {
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 240px;
      }

      .sidebar-header h1 {
        font-size: 1.25rem;
      }

      .nav-button {
        padding: 0.875rem 1rem;
        font-size: 0.875rem;
      }

      .info-panel {
        top: 10px;
        right: 10px;
        left: 10px;
        min-width: auto;
        padding: 1.25rem;
      }
    }

    /* Scrollbar Styling */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>🌐 Network Explorer</h1>
        <p>10 Complex Visualizations</p>
      </div>
      <nav class="nav-list" id="nav-container">
        <!-- Navigation items will be generated by JavaScript -->
      </nav>
    </aside>
    
    <main class="main-content">
      <div id="graph-container">
        <div class="loading" id="loading">
          <div class="loading-spinner"></div>
          <div>Loading visualization...</div>
        </div>
        <div class="info-panel" id="info-panel" style="display: none;">
          <h3 id="network-name">Network Name</h3>
          <p class="description" id="network-description">Description</p>
          <div class="info-stats">
            <div class="stat-item">
              <span class="stat-label">Nodes</span>
              <span class="stat-value" id="node-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Links</span>
              <span class="stat-value" id="link-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Density</span>
              <span class="stat-value" id="network-density">0%</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
